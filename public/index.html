<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Website Scraper</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fa;
        --panel: #ffffff;
        --ink: #172331;
        --muted: #627083;
        --line: #d8e0ea;
        --primary: #1769aa;
        --primary-strong: #0e4f83;
        --danger: #b43b3b;
        --ok: #1c7c54;
        --dark: #101820;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      header {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        padding: 22px 28px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 28px;
        letter-spacing: 0;
      }

      header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.4;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
        gap: 18px;
        padding: 18px;
        max-width: 1320px;
        margin: 0 auto;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .controls {
        padding: 18px;
      }

      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid #b9c5d2;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 15px;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 9px 12px;
        font-weight: 700;
        cursor: pointer;
        color: #ffffff;
        background: var(--primary);
      }

      button:hover { background: var(--primary-strong); }
      button:disabled { cursor: not-allowed; opacity: 0.55; }

      button.secondary {
        background: #ffffff;
        color: var(--ink);
        border-color: #b9c5d2;
      }

      button.secondary:hover { background: #edf3f8; }
      button.danger { background: var(--danger); }
      button.finish { background: var(--ok); }

      .status-panel {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
        line-height: 1.4;
      }

      .status-row span:first-child { color: var(--muted); }
      .status-row span:last-child { text-align: right; overflow-wrap: anywhere; }

      .pages {
        min-height: 180px;
        padding: 18px;
      }

      .pages h2,
      .logs h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .page-list {
        display: grid;
        gap: 10px;
      }

      .page-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fbfcfe;
      }

      .page-item strong {
        display: block;
        margin-bottom: 4px;
        overflow-wrap: anywhere;
      }

      .page-item a,
      .page-item span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .logs {
        grid-column: 1 / -1;
        overflow: hidden;
      }

      .logs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
      }

      .logs-header button {
        width: auto;
        min-height: 34px;
        padding: 6px 10px;
      }

      #logs {
        margin: 0;
        width: 100%;
        height: 360px;
        padding: 14px 18px;
        overflow: auto;
        white-space: pre-wrap;
        background: var(--dark);
        color: #e7edf4;
        font: 13px/1.5 Consolas, "Courier New", monospace;
      }

      @media (max-width: 820px) {
        main { grid-template-columns: 1fr; padding: 12px; }
        header { padding: 18px; }
        .button-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Website Scraper</h1>
      <p>Open a page, log in or navigate in the launched browser, then capture the visible page into a local HTML export.</p>
    </header>

    <main>
      <section class="controls">
        <label for="url">Website URL</label>
        <input id="url" type="url" placeholder="https://example.com/page" value="https://tefsuccess.ca/login" />

        <div class="button-grid">
          <button id="start">Start</button>
          <button id="scrape" class="secondary">Scrape Current Page</button>
          <button id="next" class="secondary">Next Page</button>
          <button id="finish" class="finish">Finish</button>
          <button id="stop" class="danger">Stop</button>
        </div>

        <div class="status-panel">
          <div class="status-row"><span>Status</span><span id="status">unknown</span></div>
          <div class="status-row"><span>Current URL</span><span id="currentUrl">-</span></div>
          <div class="status-row"><span>Output</span><span id="outputDir">-</span></div>
        </div>
      </section>

      <section class="pages">
        <h2>Saved Pages</h2>
        <div id="pages" class="page-list"></div>
      </section>

      <section class="logs">
        <div class="logs-header">
          <h2>Logs</h2>
          <button id="clear" class="secondary">Clear</button>
        </div>
        <pre id="logs"></pre>
      </section>
    </main>

    <script>
      const startBtn = document.getElementById('start');
      const scrapeBtn = document.getElementById('scrape');
      const nextBtn = document.getElementById('next');
      const finishBtn = document.getElementById('finish');
      const stopBtn = document.getElementById('stop');
      const clearBtn = document.getElementById('clear');
      const urlInput = document.getElementById('url');
      const logs = document.getElementById('logs');
      const statusEl = document.getElementById('status');
      const currentUrlEl = document.getElementById('currentUrl');
      const outputDirEl = document.getElementById('outputDir');
      const pagesEl = document.getElementById('pages');

      let running = false;

      async function post(path, body) {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      startBtn.onclick = async () => {
        try {
          appendLog('Starting scraper...');
          await post('/start', { url: urlInput.value });
          await updateStatus();
        } catch (err) {
          appendLog(`Error: ${err.message}`);
        }
      };

      scrapeBtn.onclick = () => sendAction('/scrape-current', 'Scraping current page...');
      nextBtn.onclick = () => sendAction('/next-page', 'Moving to next page...');
      finishBtn.onclick = () => sendAction('/finish', 'Finishing export...');
      stopBtn.onclick = () => sendAction('/stop', 'Stopping scraper...');
      clearBtn.onclick = () => { logs.textContent = ''; };

      async function sendAction(path, message) {
        try {
          appendLog(message);
          await post(path);
          await updateStatus();
        } catch (err) {
          appendLog(`Error: ${err.message}`);
        }
      }

      function appendLog(line) {
        logs.textContent += `${line}\n`;
        logs.scrollTop = logs.scrollHeight;
      }

      function setState(state) {
        running = !!state.running;
        statusEl.textContent = running ? 'running' : 'stopped';
        currentUrlEl.textContent = state.currentUrl || '-';
        outputDirEl.textContent = state.outputDir || '-';

        startBtn.disabled = running;
        urlInput.disabled = running;
        scrapeBtn.disabled = !running;
        nextBtn.disabled = !running;
        finishBtn.disabled = !running;
        stopBtn.disabled = !running;
      }

      function addPage(event) {
        const item = document.createElement('div');
        item.className = 'page-item';
        item.innerHTML = `
          <strong>${escapeHtml(event.title || event.url || 'Saved page')}</strong>
          <a href="${escapeHtml(event.url || '#')}" target="_blank" rel="noreferrer">${escapeHtml(event.url || '')}</a>
          <span>${escapeHtml(event.htmlFile || '')}</span>
          <span>${Number(event.assetCount || 0)} assets downloaded</span>
        `;
        pagesEl.prepend(item);
      }

      const evt = new EventSource('/events');
      evt.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          if (event.type === 'state') setState(event.state || event);
          if (event.type === 'page') addPage(event);
          if (event.message) appendLog(event.message);
        } catch (err) {
          appendLog(e.data);
        }
      };

      async function updateStatus() {
        try {
          const res = await fetch('/status');
          setState(await res.json());
        } catch (err) {
          statusEl.textContent = 'server unavailable';
        }
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      setState({ running: false });
      updateStatus();
      setInterval(updateStatus, 3000);
    </script>
  </body>
</html>
